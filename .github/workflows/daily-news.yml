name: Daily News Digest

on:
  schedule:
    # 22:00 UTC = 06:00 CST+8 next day (morning briefing)
    - cron: '0 22 * * *'
  workflow_dispatch:  # allow manual trigger from the Actions tab

permissions:
  contents: write  # needed to push the digest commit back to the repo

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate daily digest
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: python -m src.main

      - name: Commit digest
        run: |
          git config user.name "news-bot"
          git config user.email "news-bot@users.noreply.github.com"
          git add digests/
          if git diff --staged --quiet; then
            echo "No new digest to commit"
          else
            git commit -m "chore: daily digest $(date -u +%Y-%m-%d)"
            git push
          fi
