# Daily news RSS feed configuration.
# Add/remove feeds freely - each is fetched independently.
# A failed feed is logged and skipped, it never breaks the whole run.
#
# Source selection principle: first-hand (一手) + objective (客观) primary
# publishers, not aggregators. Reuters = the international newswire that
# other outlets republish; NPR = independent non-profit US public media;
# CNBC/MarketWatch = primary financial publishers; Politico/The Hill =
# primary political publishers. AP public RSS is unreliable now, so excluded.

# Max entries to keep per feed (newest first)
max_entries_per_feed: 8
# Max total entries in the digest (after dedup, newest first)
max_total_entries: 60

feeds:
  # ---------- 国际 (World) — first-hand wire + objective ----------
  - name: Reuters World
    url: https://www.reuters.com/arc/outboundfeeds/rss/category/world/?output_type=xml
    category: 国际
  - name: NPR News
    url: https://feeds.npr.org/1001/rss.xml
    category: 国际

  # ---------- 财经 (Finance) — primary financial publishers ----------
  - name: Reuters Business
    url: https://www.reuters.com/arc/outboundfeeds/rss/category/business-finance/?output_type=xml
    category: 财经
  - name: CNBC Top News
    url: https://www.cnbc.com/id/100003114/device/rss/rss.html
    category: 财经
  - name: CNBC Economy
    url: https://www.cnbc.com/id/20910258/device/rss/rss.html
    category: 财经
  - name: MarketWatch
    url: http://feeds.marketwatch.com/marketwatch/topstories/
    category: 财经
  - name: NPR Business
    url: https://feeds.npr.org/1006/rss.xml
    category: 财经

  # ---------- 政治 (Politics) — primary political publishers ----------
  - name: NPR Politics
    url: https://feeds.npr.org/1009/rss.xml
    category: 政治
  - name: Politico Politics
    url: https://rss.politico.com/politics-news.xml
    category: 政治
  - name: Politico Congress
    url: https://rss.politico.com/congress.xml
    category: 政治
  - name: The Hill
    url: https://thehill.com/feed/
    category: 政治
